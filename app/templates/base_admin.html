<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard - NEU Restaurant{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f5f7fb; }
        .sidebar { min-height: 100vh; background: #212529; color: #fff; }
        .sidebar .nav-link { color: #adb5bd; }
        .sidebar .nav-link.active, .sidebar .nav-link:hover { color: #fff; background-color: rgba(255,255,255,.08); }
        .sidebar .sidebar-heading { font-size: .85rem; text-transform: uppercase; letter-spacing: .1em; }
        .page-title { margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 sidebar py-4 px-3">
                <div class="mb-4 text-center">
                    <a href="/" class="text-decoration-none text-white">
                        <h4 class="fw-bold"><i class="bi bi-shop"></i> NEU Admin</h4>
                    </a>
                </div>
                <div class="mb-4">
                    <p class="sidebar-heading text-white-50">Quản lý</p>
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link" href="/admin/dashboard"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link" href="/admin/customers"><i class="bi bi-people me-2"></i> Customers</a></li>
                        <li class="nav-item"><a class="nav-link" href="/admin/tables"><i class="bi bi-layout-text-window-reverse me-2"></i> Tables</a></li>
                        <li class="nav-item"><a class="nav-link" href="/admin/menu"><i class="bi bi-journal-bookmark me-2"></i> Menu</a></li>
                        <li class="nav-item"><a class="nav-link" href="/admin/reservations"><i class="bi bi-calendar-check me-2"></i> Reservations</a></li>
                        <li class="nav-item"><a class="nav-link" href="/admin/invoices"><i class="bi bi-receipt me-2"></i> Invoices</a></li>
                    </ul>
                </div>
                <div class="mt-5">
                    <p class="text-white-50 small">NEU Restaurant System</p>
                </div>
            </nav>
            <main class="col-md-10 ms-sm-auto px-4 py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="h3 page-title">{% block page_title %}Admin{% endblock %}</h1>
                    <a href="/" class="btn btn-outline-secondary btn-sm"><i class="bi bi-house-door"></i> Trang khách</a>
                </div>
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/admin.js"></script>
<!-- SCRIPT QUẢN LÝ PHIÊN ĐĂNG NHẬP (SESSION) -->
<script>
    // 1. Kiểm tra nếu chưa đăng nhập thì "mời" ra trang Login
    const staffId = localStorage.getItem('staff_id');
    if (!staffId && window.location.pathname !== '/login') {
        window.location.href = '/login';
    }

    // 2. Tự động vẽ Tên nhân viên và nút Đăng xuất lên góc phải màn hình
    if (staffId) {
        const staffName = localStorage.getItem('staff_name');
        const staffRole = localStorage.getItem('staff_role');
        
        // Tạo một khối div nổi dính ở góc trên bên phải
        const userBadge = document.createElement('div');
        userBadge.className = 'position-absolute top-0 end-0 p-3 d-flex align-items-center gap-3 bg-white shadow-sm border-bottom border-start';
        userBadge.style.zIndex = '1050';
        userBadge.style.borderBottomLeftRadius = '15px';
        userBadge.innerHTML = `
            <div class="text-end">
                <div class="fw-bold text-dark mb-0 lh-1">${staffName}</div>
                <small class="text-muted fw-semibold" style="font-size: 0.75rem;">${staffRole}</small>
            </div>
            <button onclick="logout()" class="btn btn-sm btn-light border text-danger" title="Đăng xuất">
                <i class="fa-solid fa-power-off"></i>
            </button>
        `;
        document.body.appendChild(userBadge);
    }

    // 3. Hàm Đăng xuất
    function logout() {
        if(confirm('Bạn muốn đăng xuất khỏi hệ thống?')) {
            localStorage.clear(); // Xóa sạch dữ liệu bộ nhớ
            window.location.href = '/login';
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const userRole = localStorage.getItem('staff_role'); 

    // 1. Nếu là PHỤC VỤ (Waiter)
    // Quyền: Xem Menu, Xem/Sửa Bàn, Thao tác Đặt bàn.
    // Cấm: Hóa đơn, Khách hàng, Thống kê.
    if (userRole === 'Phục vụ') {
        hideMenuItems(['/invoices', '/customers', '/dashboard']); 
        makeMenuViewOnly(); // Biến trang Menu thành Chỉ-Xem
    } 
    // 2. Nếu là THU NGÂN (Cashier)
    // Quyền: Hóa đơn, Khách hàng, Bàn, Xem Menu
    // Cấm: Đặt bàn, Thống kê.
    else if (userRole === 'Thu ngân') {
        hideMenuItems(['/reservations', '/dashboard']); 
        makeMenuViewOnly(); // Biến trang Menu thành Chỉ-Xem
    }
    // 3. QUẢN LÝ (Admin) thì full quyền, không bị giới hạn gì.
});

// Hàm giấu các mục trên thanh điều hướng bên trái
function hideMenuItems(restrictedPaths) {
    document.querySelectorAll('a').forEach(link => {
        const href = link.getAttribute('href');
        if (href) {
            restrictedPaths.forEach(path => {
                if (href.includes(path)) {
                    if(link.parentElement.tagName === 'LI') {
                        link.parentElement.style.display = 'none';
                    } else {
                        link.style.display = 'none';
                    }
                }
            });
        }
    });
}

// Hàm biến trang Menu thành "Chỉ xem" (View-Only)
function makeMenuViewOnly() {
    // Chỉ chạy logic này nếu người dùng đang đứng ở trang Quản lý thực đơn
    if (window.location.pathname.includes('/menu')) {
        
        // 1. Giấu toàn bộ cột "Thêm / Sửa món" bên phải
        const formCol = document.querySelector('.col-lg-4');
        if (formCol) formCol.style.display = 'none';
        
        // 2. Phóng to cột Bảng danh sách món ăn ra full màn hình cho đẹp
        const tableCol = document.querySelector('.col-lg-8');
        if (tableCol) {
            tableCol.classList.remove('col-lg-8');
            tableCol.classList.add('col-lg-12');
        }

        // 3. Giấu tất cả các nút "Sửa" và "Xóa" trong bảng
        document.querySelectorAll('.btn-edit-menu, .btn-delete-menu').forEach(btn => {
            btn.style.display = 'none';
        });
        
        // (Tùy chọn) Ẩn luôn chữ "Hành động" trên tiêu đề bảng cho đỡ trống
        const thElements = document.querySelectorAll('th');
        thElements.forEach(th => {
            if(th.innerText.trim() === 'Hành động') {
                th.style.display = 'none';
            }
        });
        const tdElements = document.querySelectorAll('td:last-child');
        tdElements.forEach(td => {
            td.style.display = 'none';
        });
    }
}
</script>
</body>
</html>
