<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Lễ tân - NEU Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f6f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .brand-logo {
            font-size: 3rem;
            color: #0d6efd;
        }
    </style>
</head>
<body>

    <div class="card login-card border-0">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="fa-solid fa-utensils brand-logo mb-3"></i>
                <h4 class="fw-bold">NEU Restaurant</h4>
                <p class="text-muted small">Hệ thống quản lý dành cho nhân viên</p>
            </div>
            
            <div id="errorMessage" class="alert alert-danger d-none py-2 text-center small fw-bold" role="alert"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted">Số điện thoại</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-phone text-muted"></i></span>
                        <input type="text" id="phone" class="form-control border-start-0 ps-0" placeholder="Nhập số điện thoại..." required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold small text-muted">Mật khẩu (PIN)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                        <input type="password" id="password" class="form-control border-start-0 ps-0" placeholder="Mặc định: 1234" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Đăng nhập</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });
                
                const data = await res.json();
                
                if (res.ok && data.status === 'success') {
                    localStorage.setItem('staff_id', data.staff.StaffID);
                    localStorage.setItem('staff_name', data.staff.FullName);
                    localStorage.setItem('staff_role', data.staff.Role);
                    
                    // 🌟 MẤU CHỐT: Điều hướng thẳng người dùng vào đúng "phòng ban" của họ
                    const role = data.staff.Role;
                    if (role === 'Quản lý') {
                        window.location.href = '/admin/dashboard';
                    } else if (role === 'Thu ngân') {
                        window.location.href = '/admin/invoices';
                    } else if (role === 'Phục vụ') {
                        window.location.href = '/admin/reservations';
                    } else {
                        // Fallback phòng trường hợp lỗi
                        window.location.href = '/admin/dashboard'; 
                    }
                } else {
                    errorDiv.innerText = data.message || 'Sai số điện thoại hoặc mật khẩu!';
                    errorDiv.classList.remove('d-none');
                }
            } catch (err) {
                errorDiv.innerText = 'Lỗi kết nối đến máy chủ!';
                errorDiv.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
